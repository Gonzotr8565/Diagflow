<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>DiagFlow V46 - Professional Diagnostic Workflow</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overscroll-behavior: none;
            -webkit-overflow-scrolling: touch;
        }
        html, body { overscroll-behavior-y: contain; }
        .modal-overlay { backdrop-filter: blur(4px); }
        .help-button-float {
            position: fixed;
            bottom: 90px;
            right: 20px;
            z-index: 30;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Icons
        const Menu = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>;
        const Home = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>;
        const BookOpen = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>;
        const TrendingUp = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>;
        const Settings = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>;
        const CheckCircle = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
        const Circle = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" strokeWidth={2} /></svg>;
        const Camera = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>;
        const X = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>;
        const Send = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>;
        const HelpCircle = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
        const FileText = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>;
        const Trash = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>;
        
        const DIAGNOSTIC_STEPS = [
            { id: 1, title: "Pre-Scan", desc: "Document baseline codes & data" },
            { id: 2, title: "Visual Inspection", desc: "Check for obvious issues" },
            { id: 3, title: "Symptom Verification", desc: "Confirm customer concern" },
            { id: 4, title: "Trouble Code Analysis", desc: "Review stored & pending codes" },
            { id: 5, title: "Service Info Research", desc: "Review TSBs & repair procedures" },
            { id: 6, title: "Component Testing", desc: "Test suspected components" },
            { id: 7, title: "System Testing", desc: "Test related systems" },
            { id: 8, title: "Scope Testing", desc: "Analyze waveforms & signals" },
            { id: 9, title: "Pinpoint Testing", desc: "Isolate exact failure point" },
            { id: 10, title: "Root Cause Analysis", desc: "Determine why failure occurred" },
            { id: 11, title: "Repair Plan", desc: "Document repair strategy" },
            { id: 12, title: "Repair Execution", desc: "Perform necessary repairs" },
            { id: 13, title: "Post-Repair Testing", desc: "Verify repair success" },
            { id: 14, title: "Post-Scan", desc: "Clear codes & verify no new issues" },
            { id: 15, title: "Final Validation", desc: "Road test & customer verification" }
        ];

        function DiagnosticApp() {
            const [currentView, setCurrentView] = useState('home');
            const [vehicleInfo, setVehicleInfo] = useState({ year: '', make: '', model: '', vin: '' });
            const [selectedStep, setSelectedStep] = useState(null);
            const [stepData, setStepData] = useState({});
            const [showSubmitModal, setShowSubmitModal] = useState(false);
            const [advisorEmail, setAdvisorEmail] = useState('');
            const [showHelpModal, setShowHelpModal] = useState(false);
            const [helpType, setHelpType] = useState('');
            const [helpMessage, setHelpMessage] = useState('');
            const [savedReports, setSavedReports] = useState([]);
            
            // Load saved data on mount
            useEffect(() => {
                const saved = localStorage.getItem('diagflow_data');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        setVehicleInfo(data.vehicleInfo || { year: '', make: '', model: '', vin: '' });
                        setStepData(data.stepData || {});
                    } catch (e) { console.error('Load error:', e); }
                }
                const savedEmail = localStorage.getItem('diagflow_email');
                if (savedEmail) setAdvisorEmail(savedEmail);
                
                const reports = localStorage.getItem('diagflow_reports');
                if (reports) {
                    try {
                        setSavedReports(JSON.parse(reports));
                    } catch (e) { console.error('Reports load error:', e); }
                }
            }, []);
            
            // Auto-save on changes
            useEffect(() => {
                localStorage.setItem('diagflow_data', JSON.stringify({ vehicleInfo, stepData }));
            }, [vehicleInfo, stepData]);
            
            // Save email
            useEffect(() => {
                if (advisorEmail) {
                    localStorage.setItem('diagflow_email', advisorEmail);
                }
            }, [advisorEmail]);
            
            const startWorkflow = () => {
                if (vehicleInfo.year && vehicleInfo.make && vehicleInfo.model) {
                    setCurrentView('workflow');
                }
            };
            
            const resetAll = () => {
                if (confirm('Reset all data? This cannot be undone.')) {
                    setVehicleInfo({ year: '', make: '', model: '', vin: '' });
                    setStepData({});
                    setSelectedStep(null);
                    setCurrentView('home');
                    localStorage.removeItem('diagflow_data');
                }
            };
            
            const updateStepData = (stepId, field, value) => {
                setStepData(prev => ({
                    ...prev,
                    [stepId]: { ...(prev[stepId] || {}), [field]: value }
                }));
            };
            
            const toggleStepComplete = (stepId) => {
                setStepData(prev => ({
                    ...prev,
                    [stepId]: { ...(prev[stepId] || {}), completed: !prev[stepId]?.completed }
                }));
            };
            
            const handlePhotoUpload = (stepId, e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const photos = stepData[stepId]?.photos || [];
                        updateStepData(stepId, 'photos', [...photos, reader.result]);
                    };
                    reader.readAsDataURL(file);
                }
            };
            
            const removePhoto = (stepId, photoIndex) => {
                const photos = (stepData[stepId]?.photos || []).filter((_, i) => i !== photoIndex);
                updateStepData(stepId, 'photos', photos);
            };
            
            const submitToAdvisor = async () => {
                const completedSteps = DIAGNOSTIC_STEPS.filter(s => stepData[s.id]?.completed).length;
                
                const report = {
                    timestamp: new Date().toISOString(),
                    vehicle: vehicleInfo,
                    progress: `${completedSteps}/${DIAGNOSTIC_STEPS.length}`,
                    steps: DIAGNOSTIC_STEPS.map(step => ({
                        ...step,
                        data: stepData[step.id] || {},
                        completed: stepData[step.id]?.completed || false
                    }))
                };
                
                // Save to local storage
                const reports = [...savedReports, report];
                setSavedReports(reports);
                localStorage.setItem('diagflow_reports', JSON.stringify(reports));
                
                setShowSubmitModal(false);
                alert('Report saved successfully! Check Settings to view all reports.');
            };
            
            const deleteReport = (index) => {
                if (confirm('Delete this report?')) {
                    const reports = savedReports.filter((_, i) => i !== index);
                    setSavedReports(reports);
                    localStorage.setItem('diagflow_reports', JSON.stringify(reports));
                }
            };
            
            const submitHelpRequest = () => {
                alert(`Help request submitted!\n\nType: ${helpType}\nVehicle: ${vehicleInfo.year} ${vehicleInfo.make} ${vehicleInfo.model}`);
                setShowHelpModal(false);
                setHelpType('');
                setHelpMessage('');
            };
            
            const completedCount = DIAGNOSTIC_STEPS.filter(s => stepData[s.id]?.completed).length;
            const progressPercent = (completedCount / DIAGNOSTIC_STEPS.length) * 100;
            
            return (
                <div className="min-h-screen bg-gray-50 pb-20">
                    {/* Header */}
                    <div className="bg-gradient-to-r from-blue-600 to-blue-700 text-white p-4 shadow-lg sticky top-0 z-20">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <Menu />
                                <div>
                                    <h1 className="text-xl font-bold">DiagFlow V46</h1>
                                    <p className="text-xs text-blue-100">Never Miss A Step</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setShowHelpModal(true)} className="bg-orange-500 hover:bg-orange-600 px-3 py-2 rounded-lg flex items-center gap-2 text-sm font-semibold shadow-lg transition-all">
                                    <HelpCircle /> Get Help
                                </button>
                                <button onClick={resetAll} className="bg-red-500 hover:bg-red-600 px-3 py-2 rounded-lg text-sm font-semibold">
                                    New Job
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    {/* Main Content */}
                    <div className="p-4">
                        {currentView === 'home' && (
                            <div className="space-y-6">
                                <div className="bg-white rounded-lg shadow-md p-6">
                                    <h2 className="text-2xl font-bold text-gray-800 mb-4">Vehicle Information</h2>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="Year" value={vehicleInfo.year} onChange={(e) => setVehicleInfo({...vehicleInfo, year: e.target.value})} className="w-full p-3 border border-gray-300 rounded-lg" />
                                        <input type="text" placeholder="Make" value={vehicleInfo.make} onChange={(e) => setVehicleInfo({...vehicleInfo, make: e.target.value})} className="w-full p-3 border border-gray-300 rounded-lg" />
                                        <input type="text" placeholder="Model" value={vehicleInfo.model} onChange={(e) => setVehicleInfo({...vehicleInfo, model: e.target.value})} className="w-full p-3 border border-gray-300 rounded-lg" />
                                        <input type="text" placeholder="VIN (Optional)" value={vehicleInfo.vin} onChange={(e) => setVehicleInfo({...vehicleInfo, vin: e.target.value})} className="w-full p-3 border border-gray-300 rounded-lg" />
                                        <button onClick={startWorkflow} disabled={!vehicleInfo.year || !vehicleInfo.make || !vehicleInfo.model} className="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold disabled:bg-gray-300 disabled:cursor-not-allowed">
                                            Start Diagnostic Workflow
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="bg-gradient-to-br from-blue-50 to-indigo-50 rounded-lg shadow-md p-6 border border-blue-100">
                                    <h3 className="text-xl font-bold text-blue-900 mb-3">About DiagFlow</h3>
                                    <p className="text-gray-700 leading-relaxed">
                                        Professional 15-step diagnostic methodology ensuring systematic troubleshooting, comprehensive documentation, and consistent results. Never miss a critical step in your diagnostic process.
                                    </p>
                                </div>
                            </div>
                        )}
                        
                        {currentView === 'workflow' && !selectedStep && (
                            <div className="space-y-4">
                                <div className="bg-white rounded-lg shadow-md p-4">
                                    <div className="flex justify-between items-center mb-2">
                                        <h2 className="text-xl font-bold text-gray-800">
                                            {vehicleInfo.year} {vehicleInfo.make} {vehicleInfo.model}
                                        </h2>
                                        <span className="text-sm font-semibold text-blue-600">
                                            {completedCount}/{DIAGNOSTIC_STEPS.length} Steps
                                        </span>
                                    </div>
                                    {vehicleInfo.vin && (
                                        <p className="text-sm text-gray-600">VIN: {vehicleInfo.vin}</p>
                                    )}
                                    <div className="mt-3 bg-gray-200 rounded-full h-3 overflow-hidden">
                                        <div className="bg-green-500 h-full transition-all duration-500" style={{width: `${progressPercent}%`}}></div>
                                    </div>
                                </div>
                                
                                <div className="space-y-3">
                                    {DIAGNOSTIC_STEPS.map(step => (
                                        <div key={step.id} onClick={() => setSelectedStep(step.id)} className="bg-white rounded-lg shadow-md p-4 cursor-pointer hover:shadow-lg transition-shadow border-l-4 border-blue-500">
                                            <div className="flex items-start gap-3">
                                                <button onClick={(e) => { e.stopPropagation(); toggleStepComplete(step.id); }} className="mt-1">
                                                    {stepData[step.id]?.completed ? <CheckCircle className="text-green-500" /> : <Circle className="text-gray-400" />}
                                                </button>
                                                <div className="flex-1">
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-xs font-bold text-gray-500">STEP {step.id}</span>
                                                        {stepData[step.id]?.notes && <span className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">Has Notes</span>}
                                                        {stepData[step.id]?.photos?.length > 0 && <span className="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">{stepData[step.id].photos.length} Photo{stepData[step.id].photos.length !== 1 ? 's' : ''}</span>}
                                                    </div>
                                                    <h3 className="font-bold text-gray-800 mt-1">{step.title}</h3>
                                                    <p className="text-sm text-gray-600">{step.desc}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        
                        {currentView === 'workflow' && selectedStep && (
                            <div className="space-y-4">
                                <button onClick={() => setSelectedStep(null)} className="text-blue-600 font-semibold flex items-center gap-2 hover:underline">
                                    ← Back to Workflow
                                </button>
                                
                                <div className="bg-white rounded-lg shadow-md p-6">
                                    <div className="flex items-start justify-between mb-4">
                                        <div className="flex-1">
                                            <span className="text-sm font-bold text-gray-500">STEP {selectedStep}</span>
                                            <h2 className="text-2xl font-bold text-gray-800">{DIAGNOSTIC_STEPS.find(s => s.id === selectedStep)?.title}</h2>
                                            <p className="text-gray-600 mt-1">{DIAGNOSTIC_STEPS.find(s => s.id === selectedStep)?.desc}</p>
                                        </div>
                                        <button onClick={() => toggleStepComplete(selectedStep)} className={`px-4 py-2 rounded-lg font-semibold ${stepData[selectedStep]?.completed ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-700'}`}>
                                            {stepData[selectedStep]?.completed ? 'Completed ✓' : 'Mark Complete'}
                                        </button>
                                    </div>
                                    
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-2">Notes</label>
                                            <textarea value={stepData[selectedStep]?.notes || ''} onChange={(e) => updateStepData(selectedStep, 'notes', e.target.value)} placeholder="Enter your diagnostic notes..." className="w-full p-3 border border-gray-300 rounded-lg h-32" />
                                        </div>
                                        
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-2">Photos</label>
                                            <div className="flex flex-wrap gap-3 mb-3">
                                                {(stepData[selectedStep]?.photos || []).map((photo, idx) => (
                                                    <div key={idx} className="relative group">
                                                        <img src={photo} className="w-24 h-24 object-cover rounded-lg border-2 border-gray-300" />
                                                        <button onClick={() => removePhoto(selectedStep, idx)} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <X />
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                            <label className="inline-flex items-center gap-2 bg-blue-500 text-white px-4 py-2 rounded-lg cursor-pointer hover:bg-blue-600">
                                                <Camera /> Add Photo
                                                <input type="file" accept="image/*" capture="environment" onChange={(e) => handlePhotoUpload(selectedStep, e)} className="hidden" />
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {currentView === 'scope' && (
                            <div className="bg-white rounded-lg shadow-md p-6">
                                <h2 className="text-2xl font-bold text-gray-800 mb-4">Scope & Pinpoint Testing</h2>
                                <p className="text-gray-600">Advanced diagnostic testing interface coming soon...</p>
                            </div>
                        )}
                        
                        {currentView === 'settings' && (
                            <div className="space-y-4">
                                <div className="bg-white rounded-lg shadow-md p-6">
                                    <h2 className="text-2xl font-bold text-gray-800 mb-4">Settings</h2>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-semibold text-gray-700 mb-2">Service Advisor Email</label>
                                            <input type="email" value={advisorEmail} onChange={(e) => setAdvisorEmail(e.target.value)} placeholder="advisor@example.com" className="w-full p-3 border border-gray-300 rounded-lg" />
                                            {advisorEmail && (
                                                <p className="text-sm text-green-600 mt-2">✓ Email saved: {advisorEmail}</p>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="bg-white rounded-lg shadow-md p-6">
                                    <h3 className="text-xl font-bold text-gray-800 mb-4">Saved Reports ({savedReports.length})</h3>
                                    {savedReports.length === 0 ? (
                                        <p className="text-gray-500">No reports saved yet.</p>
                                    ) : (
                                        <div className="space-y-3">
                                            {savedReports.map((report, idx) => (
                                                <div key={idx} className="border border-gray-200 rounded-lg p-4 hover:shadow-md transition-shadow">
                                                    <div className="flex justify-between items-start">
                                                        <div className="flex-1">
                                                            <div className="flex items-center gap-2 mb-2">
                                                                <FileText className="text-blue-600" />
                                                                <span className="font-semibold text-gray-800">
                                                                    {report.vehicle.year} {report.vehicle.make} {report.vehicle.model}
                                                                </span>
                                                            </div>
                                                            <p className="text-sm text-gray-600">
                                                                {new Date(report.timestamp).toLocaleString()}
                                                            </p>
                                                            <p className="text-sm text-gray-600">Progress: {report.progress}</p>
                                                        </div>
                                                        <button onClick={() => deleteReport(idx)} className="text-red-500 hover:text-red-700 p-2">
                                                            <Trash />
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                    
                    {/* Floating Get Help Button */}
                    <button onClick={() => setShowHelpModal(true)} className="help-button-float bg-orange-500 hover:bg-orange-600 text-white p-4 rounded-full shadow-lg flex items-center gap-2">
                        <HelpCircle className="w-6 h-6" />
                    </button>
                    
                    {/* Help Modal */}
                    {showHelpModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 modal-overlay">
                            <div className="bg-white rounded-lg shadow-xl max-w-md w-full max-h-[90vh] overflow-y-auto">
                                <div className="p-6 space-y-4">
                                    <div className="flex justify-between items-center">
                                        <h3 className="text-2xl font-bold text-gray-800">Get Help</h3>
                                        <button onClick={() => setShowHelpModal(false)} className="text-gray-500 hover:text-gray-700">
                                            <X />
                                        </button>
                                    </div>
                                    
                                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                                        <p className="text-sm text-gray-700">
                                            <strong>Vehicle:</strong> {vehicleInfo.year} {vehicleInfo.make} {vehicleInfo.model}
                                        </p>
                                        {vehicleInfo.vin && (
                                            <p className="text-sm text-gray-700 mt-1">
                                                <strong>VIN:</strong> {vehicleInfo.vin}
                                            </p>
                                        )}
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">What do you need help with?</label>
                                        <select value={helpType} onChange={(e) => setHelpType(e.target.value)} className="w-full p-3 border border-gray-300 rounded-lg">
                                            <option value="">Select help type...</option>
                                            <option value="diagnostic">Diagnostic Question</option>
                                            <option value="technical">Technical Support</option>
                                            <option value="procedure">Procedure Guidance</option>
                                            <option value="other">Other</option>
                                        </select>
                                    </div>
                                    
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">Describe your issue</label>
                                        <textarea value={helpMessage} onChange={(e) => setHelpMessage(e.target.value)} placeholder="Describe what you need help with..." className="w-full p-3 border border-gray-300 rounded-lg h-32" />
                                    </div>
                                    
                                    <button onClick={submitHelpRequest} disabled={!helpType || !helpMessage} className="w-full bg-orange-500 text-white py-3 rounded-lg font-semibold hover:bg-orange-600 disabled:bg-gray-300 disabled:cursor-not-allowed">
                                        Submit Help Request
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Submit Modal */}
                    {showSubmitModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 modal-overlay">
                            <div className="bg-white rounded-lg shadow-xl max-w-md w-full">
                                <div className="p-6 space-y-4">
                                    <div className="flex justify-between items-center">
                                        <h3 className="text-2xl font-bold text-gray-800">Submit Report</h3>
                                        <button onClick={() => setShowSubmitModal(false)} className="text-gray-500 hover:text-gray-700">
                                            <X />
                                        </button>
                                    </div>
                                    
                                    <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                                        <p className="text-sm text-gray-700">
                                            <strong>Vehicle:</strong> {vehicleInfo.year} {vehicleInfo.make} {vehicleInfo.model}
                                        </p>
                                        <p className="text-sm text-gray-700 mt-1">
                                            <strong>Progress:</strong> {completedCount}/{DIAGNOSTIC_STEPS.length} steps completed
                                        </p>
                                        {advisorEmail && (
                                            <p className="text-sm text-gray-700 mt-1">
                                                <strong>Send to:</strong> {advisorEmail}
                                            </p>
                                        )}
                                    </div>
                                    
                                    <p className="text-sm text-gray-600">
                                        This will save the diagnostic report. You can view all saved reports in Settings.
                                    </p>
                                    
                                    <button onClick={submitToAdvisor} className="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700">
                                        Save Report
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Bottom Nav */}
                    {currentView !== 'home' && (
                        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-10">
                            <div className="max-w-screen-xl mx-auto">
                                <button onClick={() => setShowSubmitModal(true)} className="w-full bg-green-600 text-white py-3 font-semibold hover:bg-green-700 flex items-center justify-center gap-2">
                                    <Send /> Submit to Service Advisor
                                </button>
                                <div className="flex justify-around py-2">
                                    {[
                                        { icon: Home, label: 'Home', view: 'home' },
                                        { icon: BookOpen, label: 'Workflow', view: 'workflow' },
                                        { icon: TrendingUp, label: 'Scope', view: 'scope' },
                                        { icon: Settings, label: 'Settings', view: 'settings' }
                                    ].map(item => (
                                        <button key={item.view} onClick={() => { setCurrentView(item.view); setSelectedStep(null); }} className={'flex flex-col items-center gap-1 px-6 py-2 rounded-lg ' + (currentView === item.view ? 'text-blue-600 bg-blue-50' : 'text-gray-600')}>
                                            <item.icon /> <span className="text-xs font-medium">{item.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<DiagnosticApp />, document.getElementById('root'));
        console.log("✅ DiagFlow V46 Dual Help Loaded!");
    </script>
</body>
</html>
