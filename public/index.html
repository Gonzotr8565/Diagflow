// Login Component
const LoginScreen = ({ onLogin }) => {
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [isLoading, setIsLoading] = useState(false);

  const handleLogin = async (e) => {
    e.preventDefault();
    setIsLoading(true);
    setError('');

    try {
      const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });

      const data = await response.json();

      if (data.success) {
        localStorage.setItem('diagflow_token', data.token);
        // Store organization info
        if (data.organization) {
          localStorage.setItem('diagflow_org', JSON.stringify(data.organization));
        }
        onLogin(data.token, data.organization);
      } else {
        setError('Invalid password. Please try again.');
      }
    } catch (err) {
      setError('Connection error. Please try again.');
    }
    setIsLoading(false);
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-blue-600 to-blue-800 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div className="text-center mb-8">
          <div className="w-20 h-20 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center mb-4">
            <span className="text-white text-3xl font-bold">D</span>
          </div>
          <h1 className="text-2xl font-bold text-gray-800">DiagFlow</h1>
          <p className="text-gray-500 mt-1">Professional Diagnostic Workflow</p>
          <p className="text-sm text-blue-600 italic mt-2">Never Miss A Step</p>
        </div>

        <form onSubmit={handleLogin} className="space-y-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-2">
              <Lock className="w-4 h-4 inline mr-2" />
              Beta Access Password
            </label>
            <input
              type="password"
              value={password}
              onChange={(e) => setPassword(e.target.value)}
              className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              placeholder="Enter password"
              autoFocus
            />
          </div>

          {error && (
            <div className="bg-red-50 text-red-600 px-4 py-2 rounded-lg text-sm">
              {error}
            </div>
          )}

          <button
            type="submit"
            disabled={isLoading || !password}
            className="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed flex items-center justify-center gap-2"
          >
            {isLoading ? (
              <>
                <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                Verifying...
              </>
            ) : (
              'Access DiagFlow'
            )}
          </button>
        </form>

        <p className="text-center text-xs text-gray-400 mt-6">
          Version 49 Pro • Multi-Shop
        </p>
      </div>
    </div>
  );
};

      fuelTrims: {...fuelTrims}, // Pre-repair fuel trim data (Step 2)

      partsRequest: [...partsRequest],
      stepNotes: {...stepNotes},
      canLogFiles: {...canLogFiles}, // CAN bus log data
      orgId: organization?.id || null
    };
    
    // Save to org-specific localStorage key - replace existing entry with same ID, otherwise prepend
    const filteredReports = archivedReports.filter(r => r.id !== resolvedId);
    const newArchive = [report, ...filteredReports].slice(0, 50);
    setArchivedReports(newArchive);
    setCurrentReportId(resolvedId); // keep ID in sync after save
    const archiveKey = organization?.id ? `diagflow_archive_${organization.id}` : 'diagflow_archive';
    localStorage.setItem(archiveKey, JSON.stringify(newArchive));
    
    // Also save to Supabase if we have an org
    if (organization?.id) {
      try {
        // Only pass the ID if it came from Supabase (a string UUID), not a local Date.now() number
        const supabaseId = (currentReportId && typeof currentReportId === 'string') ? currentReportId
                         : (existingByRO?.fromSupabase ? existingByRO.id : null);
        const res = await fetch(`${API_BASE_URL}/api/reports/save`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            reportData: {
              id: supabaseId,
              shopName,
              technicianName,
              vehicleInfo,
              completedSteps: [...completedSteps],
              stepNotes,
              stepImages,
              partsRequest,
              status: 'archived'
            },
            orgId: organization.id
          })
        });
        const saved = await res.json();
        // Store the Supabase UUID so future re-archives update instead of insert
        if (saved.success && saved.report?.id) {
          setCurrentReportId(saved.report.id);
          // Also update the local archive entry with the real Supabase ID
          const updatedReport = { ...report, id: saved.report.id, fromSupabase: true };
          const refiltered = archivedReports.filter(r => r.id !== resolvedId && r.id !== saved.report.id);
          const finalArchive = [updatedReport, ...refiltered].slice(0, 50);
          setArchivedReports(finalArchive);
          localStorage.setItem(archiveKey, JSON.stringify(finalArchive));
        }
        console.log('Report archived to Supabase');
      } catch (err) {
        console.error('Supabase archive failed:', err);
        showToast('Cloud save failed — report saved locally only. ' + (err.message || ''), 'error');
      }
    }

    // Clear draft after successful archive
    localStorage.removeItem(`diagflow_draft_${organization?.id || 'generic'}`);

    return report;
  };

  // Compress image using canvas — caps at maxDim px and outputs as JPEG
  const compressImage = (file, maxDim = 1200, quality = 0.7) => {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width > maxDim || height > maxDim) {
            if (width > height) {
              height = Math.round(height * (maxDim / width));
              width = maxDim;
            } else {
              width = Math.round(width * (maxDim / height));
              height = maxDim;
            }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          const compressed = canvas.toDataURL('image/jpeg', quality);
          resolve(compressed);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  };

    const messages = [];
    for (const line of lines) {
      // Try semicolon-separated (CSS Electronics CL2000 default)
      let parts = line.split(';');
      if (parts.length < 4) {
        // Try space/tab-separated
        parts = line.trim().split(/[\s,]+/);
      }
      if (parts.length < 4) continue;

      // Detect format: first field is usually timestamp (number), second is CAN ID
      const timestamp = parseFloat(parts[0]);
      if (isNaN(timestamp)) continue; // skip header or non-data lines

      const canId = parts[1]?.trim();
      if (!canId) continue;

      // Find DLC and data — DLC is typically a single digit 0-8
      let dlc = 0;
      let dataBytes = [];
      // Check if format has explicit DLC field
      if (parts.length >= 5) {
        // Try to find DLC: could be at index 2, 3, or 4 depending on format
        for (let i = 2; i < Math.min(parts.length, 5); i++) {
          const val = parseInt(parts[i], 10);
          if (val >= 0 && val <= 8 && parts[i].trim().length <= 2) {
            dlc = val;
            dataBytes = parts.slice(i + 1, i + 1 + dlc).map(b => b.trim());
            break;
          }
        }
        if (dlc === 0 && parts.length > 4) {
          // Fallback: assume data bytes start at index 2 or after known fields
          dataBytes = parts.slice(2).filter(b => /^(0x)?[0-9a-fA-F]{1,2}$/.test(b.trim()));
          dlc = dataBytes.length;
        }
      }

      messages.push({
        timestamp,
        id: canId.toUpperCase().replace(/^0X/i, '0x'),
        dlc,
        data: dataBytes.join(' ')
      });
    }

    // Build summary
    const idCounts = {};
    messages.forEach(m => { idCounts[m.id] = (idCounts[m.id] || 0) + 1; });
    const uniqueIds = Object.keys(idCounts).sort();
    const timeSpan = messages.length > 1
      ? (messages[messages.length - 1].timestamp - messages[0].timestamp).toFixed(2)
      : '0';

    return {
      totalMessages: messages.length,
      uniqueIds: uniqueIds.length,
      timeSpanSeconds: timeSpan,
      idCounts,
      topIds: uniqueIds.sort((a, b) => idCounts[b] - idCounts[a]).slice(0, 20),
      sampleMessages: messages.slice(0, 10),
      allMessages: messages
    };
  };

  const handleCanLogUpload = (stepId, event) => {
    const files = Array.from(event.target.files);
    files.forEach(file => {
      const isMF4 = file.name.toLowerCase().endsWith('.mf4');
      const reader = new FileReader();
      reader.onload = async ev => {
        if (isMF4) {
          // MF4 binary — send to server for parsing
          try {
            const base64 = ev.target.result.split(',')[1];
            const resp = await fetch('/api/parse-mf4', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ fileBase64: base64 })
            });
            const data = await resp.json();
            if (!data.success) throw new Error(data.error);
            const logEntry = {
              id: Date.now() + Math.random(),
              name: file.name,
              isMF4: true,
              rawText: '', // MF4 is binary, raw text not applicable
              summary: {
                totalMessages: data.totalMessages,
                uniqueIds: data.uniqueIds,
                timeSpanSeconds: data.timeSpanSeconds,
                idCounts: data.idCounts,
                topIds: data.topIds,
                sampleMessages: data.sampleMessages?.map(m => ({
                  timestamp: parseFloat(m.timestamp),
                  id: m.id,
                  dlc: m.dlc,
                  data: m.data
                })) || [],
                obd2Decoded: data.obd2Decoded || [],
                obd2Summary: data.obd2Summary || []
              }
            };
            setCanLogFiles(prev => ({
              ...prev,
              [stepId]: [...(prev[stepId] || []), logEntry]
            }));
            showToast('MF4 parsed: ' + data.totalMessages + ' CAN messages, ' + data.uniqueIds + ' unique IDs' + (data.obd2Decoded?.length ? ', ' + data.obd2Decoded.length + ' OBD2 values decoded' : ''), 'success');
          } catch (err) {
            showToast('MF4 parse failed: ' + err.message, 'error');
          }
        } else {
          // Text-based CAN log
          const rawText = ev.target.result;
          const summary = parseCanLog(rawText);
          const logEntry = {
            id: Date.now() + Math.random(),
            name: file.name,
            rawText: rawText.slice(0, 500000),
            summary
          };
          setCanLogFiles(prev => ({
            ...prev,
            [stepId]: [...(prev[stepId] || []), logEntry]
          }));
        }
      };
      if (isMF4) {
        reader.readAsDataURL(file); // base64 for binary
      } else {
        reader.readAsText(file);
      }
    });
    event.target.value = '';
  };

                        >
                          Remove
                        </button>
                      </div>
                    ))}
                  </div>
                )}

                <div className="flex gap-2">
                  <input
                    type="email"
                    id="newRecipientEmail"
                    placeholder="serviceadvisor@shop.com"
                    className="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm"
                    onKeyPress={(e) => {
                      if (e.key === 'Enter') {
                        const input = e.target;
                        addDefaultRecipient(input.value);
                        input.value = '';
                      }
                    }}
                  />
                  <button
                    onClick={() => {
                      const input = document.getElementById('newRecipientEmail');
                      addDefaultRecipient(input.value);
                      input.value = '';
                    }}
                    className="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-green-700"
                  >
                    Add
                  </button>
                </div>
                <p className="text-xs text-gray-500 mt-2">
                  These emails will automatically receive all diagnostic reports
                </p>
              </div>

              {/* Owner Email & Auto-CC */}
              <div className="space-y-3 pt-4 border-t">
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-2">
                    Owner Email (Optional)
                  </label>
                  <input
                    type="email"
                    value={shopProfile.ownerEmail}
                    onChange={(e) => {
                      saveShopProfile({...shopProfile, ownerEmail: e.target.value});
                    }}
                    placeholder="owner@shop.com"
                    className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm"
                  />
                </div>

                <label className="flex items-center gap-2 cursor-pointer">
                  <input
                    type="checkbox"
                    checked={shopProfile.alwaysCCOwner}
                    onChange={(e) => {
                      saveShopProfile({...shopProfile, alwaysCCOwner: e.target.checked});
                    }}
                    className="w-4 h-4"
                  />
                  <span className="text-sm text-gray-700">
                    Always CC owner on all reports
                  </span>
                </label>
              </div>

              {/* Summary */}
              {(shopProfile.defaultRecipients.length > 0 || (shopProfile.alwaysCCOwner && shopProfile.ownerEmail)) && (
                <div className="mt-4 p-3 bg-green-50 rounded-lg text-sm">
                  <strong className="text-green-800">Active Recipients:</strong>
                  <ul className="mt-2 space-y-1">
                    {shopProfile.defaultRecipients.map((email, index) => (
                      <li key={index} className="text-green-700">✓ {email}</li>
                    ))}
                    {shopProfile.alwaysCCOwner && shopProfile.ownerEmail && (
                      <li className="text-green-700">✓ {shopProfile.ownerEmail} (Owner - Auto CC)</li>
                    )}
                  </ul>
                  <p className="text-xs text-gray-600 mt-2">
                    You can still add additional recipients when submitting each report
                  </p>
                </div>
              )}
            </div>
            
            <div className="bg-white p-6 rounded-lg shadow-md">
              <h3 className="text-lg font-bold mb-2">About DiagFlow</h3>
              <p className="text-sm text-gray-600 mb-2">Version 49 Pro - Email Routing Edition</p>
              <p className="text-xs text-gray-500">
                13-Step systematic diagnostic methodology designed by Master Technicians
              </p>
            </div>

            <div className="bg-white p-6 rounded-lg shadow-md">
              <h3 className="text-lg font-bold mb-3 text-red-600">Account</h3>
              <button
                onClick={handleLogout}
                className="w-full bg-red-100 text-red-600 py-3 rounded-lg font-semibold hover:bg-red-200 flex items-center justify-center gap-2"
              >
                <LogOut className="w-5 h-5" />
                Sign Out
              </button>
              <p className="text-xs text-gray-400 mt-2 text-center">
                You will need the beta password to sign back in
              </p>
            </div>
          </div>
        ) : (
          <div className="bg-white p-6 rounded-lg shadow-md">
            <h2 className="text-xl font-bold mb-4">Page Not Found</h2>
            <p className="text-sm text-gray-600">The requested page could not be found.</p>
          </div>
        )}
      </div>

      {/* Submit to SA Button - Always visible at bottom */}
      {hasVehicleInfo && (
        <>
          {/* Submit Button Bar */}
          <div className="fixed bottom-20 left-0 right-0 bg-white border-t shadow-lg">
            <div className="max-w-4xl mx-auto px-4 py-2">
              <button
                onClick={() => setShowSubmitModal(true)}
                className="w-full bg-green-600 text-white py-2.5 rounded-lg font-semibold hover:bg-green-700 flex items-center justify-center gap-2 text-sm"
              >
                <FileText className="w-4 h-4" />
                Submit to Service Advisor
              </button>
            </div>
          </div>
        </>
      )}

      {/* Bottom Navigation */}
      <div className="fixed bottom-0 left-0 right-0 bg-white border-t">
        <div className="max-w-4xl mx-auto">
          <div className="flex justify-around py-2">
            {[
              { icon: Home, label: 'Home', view: 'home' },
              { icon: BookOpen, label: 'Workflow', view: 'workflow' },
              { icon: TrendingUp, label: 'Scope', view: 'scope' },
              { icon: Settings, label: 'Settings', view: 'settings' }
            ].map(item => (
              <button 
                key={item.view} 
                onClick={() => { 
                  if (item.view === 'workflow' && !hasVehicleInfo) {
                    setCurrentView('vehicle-info');
                  } else {
                    setCurrentView(item.view);
                  }
                  setSelectedStep(null);
                  setSelectedScopeWorkflow(null);
                }} 
                className={`flex flex-col items-center gap-1 px-4 py-2 ${currentView === item.view ? 'text-blue-600' : 'text-gray-600'}`}
              >
                <item.icon className="w-6 h-6" />
                <span className="text-xs">{item.label}</span>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};


        ReactDOM.render(<DiagnosticApp />, document.getElementById('root'));
        console.log("✅ DiagFlow V49 Pro Loaded!");
    </script>
</body>
</html>
