const API_BASE_URL = 'https://diagflow-production.up.railway.app';

// Login Component
const LoginScreen = ({ onLogin }) => {
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [isLoading, setIsLoading] = useState(false);

  const handleLogin = async (e) => {
    e.preventDefault();
    setIsLoading(true);
    setError('');

    try {
      const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });

      const data = await response.json();

      if (data.success) {
        localStorage.setItem('diagflow_token', data.token);
        onLogin(data.token);
      } else {
        setError('Invalid password. Please try again.');
      }
    } catch (err) {
      setError('Connection error. Please try again.');
    }
    setIsLoading(false);
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-blue-600 to-blue-800 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div className="text-center mb-8">
          <div className="w-20 h-20 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center mb-4">
            <span className="text-white text-3xl font-bold">D</span>
          </div>
          <h1 className="text-2xl font-bold text-gray-800">DiagFlow</h1>
          <p className="text-gray-500 mt-1">Professional Diagnostic Workflow</p>
          <p className="text-sm text-blue-600 italic mt-2">Never Miss A Step</p>
        </div>

        <form onSubmit={handleLogin} className="space-y-4">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-2">
              <Lock className="w-4 h-4 inline mr-2" />
              Beta Access Password
            </label>
            <input
              type="password"
              value={password}
              onChange={(e) => setPassword(e.target.value)}
              className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              placeholder="Enter password"
              autoFocus
            />
          </div>

          {error && (
            <div className="bg-red-50 text-red-600 px-4 py-2 rounded-lg text-sm">
              {error}
            </div>
          )}

          <button
            type="submit"
            disabled={isLoading || !password}
            className="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed flex items-center justify-center gap-2"
          >
            {isLoading ? (
              <>
                <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                Verifying...
              </>
            ) : (
              'Access DiagFlow'
            )}
          </button>
        </form>

        <p className="text-center text-xs text-gray-400 mt-6">
          Version 47 Pro • Beta Testing
        </p>
      </div>
    </div>
  );
};

            <button onClick={() => setSelectedStep(null)} className="text-blue-600 flex items-center gap-2">
              <ChevronRight className="w-4 h-4 rotate-180" />
              Back to Workflow
            </button>

            <div className="bg-gradient-to-r from-blue-600 to-blue-800 text-white p-6 rounded-lg">
              <div className="text-sm font-semibold mb-2">STEP {selectedStep.id}</div>
              <h2 className="text-2xl font-bold mb-2">{selectedStep.title}</h2>
            </div>

            <div className="bg-amber-50 p-4 rounded-lg border-l-4 border-amber-500">
              <h3 className="font-bold text-sm mb-2 flex items-center gap-2">
                <Award className="w-4 h-4" />
                Best Practice
              </h3>
              <p className="text-sm text-gray-800">{selectedStep.bestPractice}</p>
            </div>

            {selectedStep.id === 9 && (
              <div className="bg-purple-50 p-4 rounded-lg border-l-4 border-purple-500">
                <h3 className="font-bold text-sm mb-2 flex items-center gap-2">
                  <TrendingUp className="w-4 h-4" />
                  Advanced Diagnostics
                </h3>
                <p className="text-sm text-gray-800 mb-3">
                  Ready for advanced scope work and pinpoint testing? Access the specialized workflow.
                </p>
                <button
                  onClick={() => setCurrentView('scope')}
                  className="w-full bg-purple-600 text-white py-2 rounded-lg font-semibold hover:bg-purple-700"
                >
                  Go to Scope & Pinpoint Workflow
                </button>
              </div>
            )}

            <div className="bg-white p-6 rounded-lg shadow-md">
              <h3 className="font-bold text-lg mb-3 flex items-center gap-2">
                <Edit2 className="w-5 h-5 text-blue-600" />
                Your Notes
              </h3>
              <textarea
                className="w-full px-4 py-3 border rounded-lg text-sm"
                rows={6}
                placeholder="Document your findings, test results, measurements, DTCs, or observations here..."

                onChange={(e) => saveStepNote(selectedStep.id, e.target.value)}
              />
              <p className="text-xs text-gray-500 mt-2">Notes saved automatically</p>
            </div>

            <div className="bg-white p-6 rounded-lg shadow-md">
              <h3 className="font-bold text-lg mb-3">Photo Documentation</h3>
              <p className="text-xs text-gray-600 mb-3">Upload images to document findings, conditions, or test results</p>
              
              <input
                type="file"
                accept="image/jpeg,image/png,image/jpg"
                multiple
                onChange={(e) => handleImageUpload(selectedStep.id, e)}
                className="hidden"
                id={`image-upload-${selectedStep.id}`}
              />
              <label
                htmlFor={`image-upload-${selectedStep.id}`}
                className="block w-full bg-blue-600 text-white py-2 px-4 rounded-lg font-semibold text-center cursor-pointer hover:bg-blue-700"
              >
                + Add Photos (JPG, PNG)
              </label>

              {stepImages[selectedStep.id] && stepImages[selectedStep.id].length > 0 && (
                <div className="mt-4 space-y-4">
                  {stepImages[selectedStep.id].map(image => (
                    <div key={image.id} className="border rounded-lg p-3 bg-gray-50">
                      <div className="flex gap-3">
                        <img 
                          src={image.url} 
                          alt={image.name}
                          className="w-24 h-24 object-cover rounded"
                        />
                        <div className="flex-1 space-y-2">
                          <div className="flex gap-2">
                            <button
                              onClick={() => updateImageType(selectedStep.id, image.id, 'good')}
                              className={`px-3 py-1 rounded text-xs font-semibold ${
                                image.type === 'good' ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-700'
                              }`}
                            >
                              Good
                            </button>
                            <button
                              onClick={() => updateImageType(selectedStep.id, image.id, 'bad')}
                              className={`px-3 py-1 rounded text-xs font-semibold ${
                                image.type === 'bad' ? 'bg-red-500 text-white' : 'bg-gray-200 text-gray-700'
                              }`}
                            >
                              Bad
                            </button>
                            <button
                              onClick={() => updateImageType(selectedStep.id, image.id, 'neutral')}
                              className={`px-3 py-1 rounded text-xs font-semibold ${
                                image.type === 'neutral' ? 'bg-gray-500 text-white' : 'bg-gray-200 text-gray-700'
                              }`}
                            >
                              Info
                            </button>
                          </div>
                          <input
                            type="text"
                            placeholder="Add description..."
                            className="w-full px-3 py-1 border rounded text-sm"
                            value={image.description}
                            onChange={(e) => updateImageDescription(selectedStep.id, image.id, e.target.value)}
                          />
                          <button
                            onClick={() => deleteImage(selectedStep.id, image.id)}
                            className="text-red-600 text-xs hover:underline"
                          >
                            Delete
                          </button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="pb-4">
              <button 
                onClick={() => {
                  setCompletedSteps(prev => [...prev, selectedStep.id]);
                  setTimeout(() => {
                    setSelectedStep(null);
                    setCurrentView('workflow');
                  }, 100);
                }}
                className="w-full py-3 rounded-lg font-semibold bg-green-600 text-white hover:bg-green-700"
              >
                Complete Step & Return to Workflow
              </button>
            </div>
          </div>
        ) : selectedScopeWorkflow && currentView === 'scope' ? (
          <div className="space-y-4">
            <button onClick={() => setSelectedScopeWorkflow(null)} className="text-blue-600 flex items-center gap-2">
              <ChevronRight className="w-4 h-4 rotate-180" />
              Back to Scope Workflows
            </button>

            <div className={`${selectedScopeWorkflow.color} text-white p-6 rounded-lg`}>
              <selectedScopeWorkflow.icon className="w-8 h-8 mb-2" />
              <h2 className="text-2xl font-bold mb-2">{selectedScopeWorkflow.title}</h2>
              <p className="text-sm opacity-90">{selectedScopeWorkflow.description}</p>
            </div>

            <div className="bg-orange-50 p-4 rounded-lg border border-orange-200">
              <div className="flex items-center justify-between">
                <div className="flex-1">
                  <div className="flex items-center gap-2 mb-1">
                    <HelpCircle className="w-5 h-5 text-orange-600" />
                    <span className="font-semibold text-orange-900">Need Expert Guidance?</span>
                  </div>
                  <p className="text-xs text-orange-800">
                    Connect with a Master Tech for real-time help with scope diagnostics
                  </p>
                </div>
                <button
                  onClick={() => setShowHelpModal(true)}
                  className="bg-orange-500 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-orange-600 flex items-center gap-1 ml-4"
                >
                  <HelpCircle className="w-4 h-4" />
                  Get Help
                </button>
              </div>
            </div>

            {selectedScopeWorkflow.steps.map((step) => (
              <div key={step.id} className="bg-white rounded-lg shadow-md overflow-hidden">
                <div className="bg-gray-100 p-4 border-b">
                  <h3 className="font-bold flex items-center gap-2">
                    <span className="text-xs font-semibold text-blue-600">STEP {step.id}</span>
                    {step.title}
                  </h3>
                </div>
                <div className="p-4 space-y-3">
                  <div>
                    <h4 className="font-semibold text-sm mb-1">Description:</h4>
                    <p className="text-sm text-gray-700">{step.description}</p>
                  </div>
                  <div>
                    <h4 className="font-semibold text-sm mb-1">Procedure:</h4>
                    <p className="text-sm text-gray-700">{step.procedure}</p>
                  </div>
                  <div className="bg-amber-50 p-3 rounded border-l-4 border-amber-500">
                    <h4 className="font-semibold text-sm mb-1">Pro Tips:</h4>
                    <p className="text-sm text-gray-800">{step.tips}</p>
                  </div>
                  
                  {step.samples && step.samples.length > 0 && (
                    <div className="bg-blue-50 p-4 rounded border-l-4 border-blue-500">
                      <h4 className="font-semibold text-sm mb-3">Sample Waveforms & Examples:</h4>
                      <div className="grid grid-cols-1 gap-3">
                        {step.samples.map((sample, idx) => (
                          <div key={idx} className="bg-white rounded-lg p-3 border shadow-sm">
                            <div className="flex gap-3">
                              <img
                                src={sample.image}
                                alt={sample.title}
                                className="w-24 h-24 object-cover rounded cursor-pointer hover:opacity-80 transition-opacity"
                                onClick={() => setExpandedImage(sample)}
                              />
                              <div className="flex-1">
                                <h5 className="font-semibold text-sm mb-1 text-gray-900">{sample.title}</h5>
                                <p className="text-xs text-gray-600">{sample.description}</p>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                      <p className="text-xs text-gray-500 mt-3 italic">Tap any image to view full size</p>
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
        ) : currentView === 'home' ? (
          <div className="space-y-6">
            <div className="bg-gradient-to-r from-blue-600 to-blue-800 text-white p-6 rounded-lg">
              <h2 className="text-2xl font-bold mb-2">Current Job</h2>
              {hasVehicleInfo && (
                <div className="mt-4 pt-4 border-t border-blue-500">
                  <div className="text-sm space-y-1">
                    {vehicleInfo.roNumber && <div>RO#: {vehicleInfo.roNumber}</div>}
                    <div>{vehicleInfo.year} {vehicleInfo.make} {vehicleInfo.model}</div>
                    {vehicleInfo.vin && <div className="font-mono text-xs">{vehicleInfo.vin}</div>}
                  </div>
                </div>
              )}
            </div>

            <div className="grid grid-cols-2 gap-4">
              <div className="bg-white p-4 rounded-lg shadow-md text-center">
                <div className="text-2xl font-bold text-blue-600">{completedSteps.length}</div>
                <div className="text-xs text-gray-600">Steps Done</div>
              </div>
              <div className="bg-white p-4 rounded-lg shadow-md text-center">
                <div className="text-2xl font-bold text-green-600">{Object.keys(stepNotes).length}</div>
                <div className="text-xs text-gray-600">Notes Taken</div>
              </div>
              <div className="bg-white p-4 rounded-lg shadow-md text-center">
                <div className="text-2xl font-bold text-orange-600">
                  {Object.values(stepImages).reduce((sum, imgs) => sum + imgs.length, 0)}
                </div>
                <div className="text-xs text-gray-600">Photos Added</div>
              </div>
              <div className="bg-white p-4 rounded-lg shadow-md text-center">
                <div className="text-2xl font-bold text-purple-600">{Math.round((completedSteps.length / 15) * 100)}%</div>
                <div className="text-xs text-gray-600">Progress</div>
              </div>
            </div>

            <button
              onClick={() => setCurrentView('workflow')}
              className="w-full bg-blue-600 text-white py-4 rounded-lg font-semibold hover:bg-blue-700"
            >
              Continue Diagnostic Workflow
            </button>
          </div>
        ) : currentView === 'workflow' ? (
          <div className="space-y-4">
            <div className="bg-white p-4 rounded-lg shadow-md">
              <h2 className="text-xl font-bold">15-Step Diagnostic Process</h2>
              <div className="mt-3 w-full bg-gray-200 rounded-full h-2">
                <div className="bg-blue-600 h-2 rounded-full transition-all" style={{ width: `${(completedSteps.length / 15) * 100}%` }} />
              </div>
              <p className="text-xs text-gray-600 mt-2">{completedSteps.length} of 15 steps completed</p>
            </div>

            {['Pre-Diagnostic', 'Research', 'Diagnosis', 'Repair'].map(cat => (
              <div key={cat} className="bg-white rounded-lg shadow-md overflow-hidden">
                <div className="bg-gray-100 p-4 border-b">
                  <h3 className="font-bold">{cat}</h3>
                </div>
                {diagnosticSteps.filter(s => s.category === cat).map(step => (
                  <div key={step.id} className="p-4 border-b hover:bg-gray-50 cursor-pointer" onClick={() => setSelectedStep(step)}>
                    <div className="flex items-center gap-3">
                      {completedSteps.includes(step.id) ? (
                        <CheckCircle className="w-6 h-6 text-green-500 flex-shrink-0" />
                      ) : (
                        <Circle className="w-6 h-6 text-gray-300 flex-shrink-0" />
                      )}
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2">
                          <span className="text-xs font-semibold text-blue-600">STEP {step.id}</span>
                          <h4 className="font-semibold">{step.title}</h4>
                        </div>
                        {stepNotes[step.id] && (
                          <p className="text-xs text-gray-500 mt-1 flex items-center gap-1">
                            <Edit2 className="w-3 h-3" /> Notes added
                          </p>
                        )}
                        {stepImages[step.id] && stepImages[step.id].length > 0 && (
                          <p className="text-xs text-gray-500 mt-1">
                            📷 {stepImages[step.id].length} photo{stepImages[step.id].length !== 1 ? 's' : ''}
                          </p>
                        )}
                      </div>
                      <ChevronRight className="w-5 h-5 text-gray-400 flex-shrink-0" />
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        ) : currentView === 'scope' ? (
          <div className="space-y-4">
            <div className="bg-white p-4 rounded-lg shadow-md">
              <h2 className="text-xl font-bold mb-2">Scope and Pinpoint Workflow</h2>
              <p className="text-sm text-gray-600">Select a testing category to begin advanced diagnostics</p>
            </div>

            <div className="bg-orange-50 p-4 rounded-lg border border-orange-200">
              <div className="flex items-center justify-between">
                <div className="flex-1">
                  <div className="flex items-center gap-2 mb-1">
                    <HelpCircle className="w-5 h-5 text-orange-600" />
                    <span className="font-semibold text-orange-900">Advanced Diagnostics Support</span>
                  </div>
                  <p className="text-xs text-orange-800">
                    Stuck on a scope test? Get live help from expert technicians
                  </p>
                </div>
                <button
                  onClick={() => setShowHelpModal(true)}
                  className="bg-orange-500 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-orange-600 flex items-center gap-1 ml-4"
                >
                  <HelpCircle className="w-4 h-4" />
                  Get Help
                </button>
              </div>
            </div>

            <div className="grid gap-4">
              {scopeWorkflows.map(workflow => (
                <div
                  key={workflow.id}
                  className={`${workflow.color} text-white p-6 rounded-lg shadow-md cursor-pointer hover:opacity-90 transition-opacity`}
                  onClick={() => setSelectedScopeWorkflow(workflow)}
                >
                  <div className="flex items-start gap-4">
                    <workflow.icon className="w-10 h-10 flex-shrink-0" />
                    <div className="flex-1">
                      <h3 className="text-xl font-bold mb-2">{workflow.title}</h3>
                      <p className="text-sm opacity-90 mb-3">{workflow.description}</p>
                      <div className="flex items-center gap-2 text-sm">
                        <span>{workflow.steps.length} Steps</span>
                        <ChevronRight className="w-4 h-4" />
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        ) : currentView === 'howto' ? (
          <HowToUsePage />
        ) : currentView === 'settings' ? (
          <div className="space-y-4">
            <div className="bg-white p-6 rounded-lg shadow-md">
              <h2 className="text-xl font-bold mb-4">Settings</h2>
              
              <div className="space-y-4">
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-2">
                    🏢 Shop Name
                  </label>
                  <input
                    type="text"
                    value={shopName}
                    onChange={(e) => {
                      setShopName(e.target.value);
                      localStorage.setItem('diagflow_shopName', e.target.value);
                    }}
                    placeholder="Master Tech Automotive"
                    className="w-full px-4 py-2 border border-gray-300 rounded-lg"
                  />
                  {shopName && (
                    <p className="text-sm text-green-600 mt-2">
                      ✓ Shop name saved
                    </p>
                  )}
                </div>

                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-2">
                    👤 Technician Name
                  </label>
                  <input
                    type="text"
                    value={technicianName}
                    onChange={(e) => {
                      setTechnicianName(e.target.value);
                      localStorage.setItem('diagflow_technicianName', e.target.value);
                    }}
                    placeholder="John Smith"
                    className="w-full px-4 py-2 border border-gray-300 rounded-lg"
                  />
                  {technicianName && (
                    <p className="text-sm text-green-600 mt-2">
                      ✓ Technician name saved
                    </p>
                  )}
                </div>

                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-2">
                    📧 Service Advisor Email
                  </label>
                  <input
                    type="email"
                    value={advisorEmail}
                    onChange={(e) => {
                      setAdvisorEmail(e.target.value);
                      setSubmitEmail(e.target.value);
                      localStorage.setItem('diagflow_advisorEmail', e.target.value);
                    }}
                    placeholder="advisor@example.com"
                    className="w-full px-4 py-2 border border-gray-300 rounded-lg"
                  />
                  {advisorEmail && (
                    <p className="text-sm text-green-600 mt-2">
                      ✓ Email saved: {advisorEmail}
                    </p>
                  )}
                  <p className="text-xs text-gray-500 mt-2">
                    This email will be used when submitting reports to your service advisor
                  </p>
                </div>
              </div>
            </div>
            
            <div className="bg-white p-6 rounded-lg shadow-md">
              <h3 className="text-lg font-bold mb-2">About DiagFlow</h3>
              <p className="text-sm text-gray-600 mb-2">Version 47 - Professional Edition</p>
              <p className="text-xs text-gray-500">
                15-Step systematic diagnostic methodology designed by Master Technicians
              </p>
            </div>

            <div className="bg-white p-6 rounded-lg shadow-md">
              <h3 className="text-lg font-bold mb-3 text-red-600">Account</h3>
              <button
                onClick={handleLogout}
                className="w-full bg-red-100 text-red-600 py-3 rounded-lg font-semibold hover:bg-red-200 flex items-center justify-center gap-2"
              >
                <LogOut className="w-5 h-5" />
                Sign Out
              </button>
              <p className="text-xs text-gray-400 mt-2 text-center">
                You will need the beta password to sign back in
              </p>
            </div>
          </div>
        ) : (
          <div className="bg-white p-6 rounded-lg shadow-md">
            <h2 className="text-xl font-bold mb-4">Page Not Found</h2>
            <p className="text-sm text-gray-600">The requested page could not be found.</p>
          </div>
        )}
      </div>

      {/* Submit to SA Button - Always visible at bottom */}
      {hasVehicleInfo && (
        <>
          {/* Floating Get Help Button */}
          <button
            onClick={() => setShowHelpModal(true)}
            className="fixed bottom-24 right-6 bg-orange-500 hover:bg-orange-600 text-white p-4 rounded-full shadow-lg z-40 flex items-center justify-center"
            style={{ width: '56px', height: '56px' }}
          >
            <HelpCircle className="w-6 h-6" />
          </button>
          
          {/* Submit Button Bar */}
          <div className="fixed bottom-20 left-0 right-0 bg-white border-t shadow-lg">
            <div className="max-w-4xl mx-auto px-4 py-2">
              <button
                onClick={() => setShowSubmitModal(true)}
                className="w-full bg-green-600 text-white py-2.5 rounded-lg font-semibold hover:bg-green-700 flex items-center justify-center gap-2 text-sm"
              >
                <FileText className="w-4 h-4" />
                Submit to Service Advisor
              </button>
            </div>
          </div>
        </>
      )}

      {/* Bottom Navigation */}
      <div className="fixed bottom-0 left-0 right-0 bg-white border-t">
        <div className="max-w-4xl mx-auto">
          <div className="flex justify-around py-2">
            {[
              { icon: Home, label: 'Home', view: 'home' },
              { icon: BookOpen, label: 'Workflow', view: 'workflow' },
              { icon: TrendingUp, label: 'Scope', view: 'scope' },
              { icon: Settings, label: 'Settings', view: 'settings' }
            ].map(item => (
              <button 
                key={item.view} 
                onClick={() => { 
                  setCurrentView(item.view); 
                  setSelectedStep(null);
                  setSelectedScopeWorkflow(null);
                }} 
                className={`flex flex-col items-center gap-1 px-4 py-2 ${currentView === item.view ? 'text-blue-600' : 'text-gray-600'}`}
              >
                <item.icon className="w-6 h-6" />
                <span className="text-xs">{item.label}</span>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};


        ReactDOM.render(<DiagnosticApp />, document.getElementById('root'));
        console.log("✅ DiagFlow V47 Pro Loaded!");
    </script>
</body>
</html>
